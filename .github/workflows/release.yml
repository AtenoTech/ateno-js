name: Auto-Update Homebrew (JS)

on:
  push:
    tags:
      - 'v*'

jobs:
  update-brew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Calculate SHA256
        id: shasum
        run: |
          curl -L -o code.tar.gz https://github.com/AtenoTech/ateno-js/archive/refs/tags/${{ github.ref_name }}.tar.gz
          echo "HASH=$(shasum -a 256 code.tar.gz | awk '{print $1}')" >> $GITHUB_ENV

      - name: Update Homebrew Repo
        run: |
          git config --global user.name "Ateno Robot"
          git config --global user.email "robot@ateno.co"
          
          # Clone the repo
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/AtenoTech/ateno-homebrew.git hb-repo
          cd hb-repo
          
          # DEBUG: This will show us if the Formula folder actually exists in GitHub
          ls -R
          
          # Update the file
          # We use -i.bak to be safer on different systems
          sed -i "s|url \".*\"|url \"https://github.com/AtenoTech/ateno-js/archive/refs/tags/${{ github.ref_name }}.tar.gz\"|g" Formula/ateno-js.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ env.HASH }}\"|g" Formula/ateno-js.rb
          
          git add Formula/ateno-js.rb
          git commit -m "Update ateno-js to ${{ github.ref_name }}"
          git push